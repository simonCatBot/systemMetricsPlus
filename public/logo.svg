<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="60" stroke="url(#grad)" stroke-width="4" fill="none"/>
  
  <!-- Inner decorative ring -->
  <circle cx="64" cy="64" r="52" stroke="#1e3a5f" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Server/monitor base -->
  <rect x="24" y="38" width="80" height="56" rx="6" fill="#0f172a" stroke="url(#grad)" stroke-width="3"/>
  
  <!-- Screen area -->
  <rect x="30" y="44" width="68" height="38" rx="3" fill="#1e293b"/>
  
  <!-- CPU chip in center -->
  <rect x="50" y="54" width="28" height="28" rx="2" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <rect x="58" y="62" width="12" height="12" rx="1" fill="#22d3ee" opacity="0.8"/>
  
  <!-- CPU pins left -->
  <line x1="38" y1="54" x2="48" y2="54" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="62" x2="48" y2="62" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="70" x2="48" y2="70" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="78" x2="48" y2="78" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  
  <!-- CPU pins right -->
  <line x1="80" y1="54" x2="90" y2="54" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="62" x2="90" y2="62" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="70" x2="90" y2="70" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="78" x2="90" y2="78" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Activity bars on screen -->
  <rect x="34" y="48" width="4" height="8" rx="1" fill="#22d3ee" opacity="0.6"/>
  <rect x="40" y="50" width="4" height="6" rx="1" fill="#22d3ee" opacity="0.8"/>
  <rect x="46" y="47" width="4" height="9" rx="1" fill="#22d3ee"/>
  
  <!-- Stand -->
  <rect x="54" y="94" width="20" height="8" rx="2" fill="#0f172a" stroke="#1e3a5f" stroke-width="2"/>
  <rect x="48" y="100" width="32" height="6" rx="3" fill="#0f172a" stroke="#1e3a5f" stroke-width="2"/>
  
  <!-- Plus symbol accent -->
  <circle cx="100" cy="28" r="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <line x1="100" y1="22" x2="100" y2="34" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <line x1="94" y1="28" x2="106" y2="28" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Dot accents -->
  <circle cx="28" cy="28" r="4" fill="#22d3ee" opacity="0.7"/>
  <circle cx="20" cy="44" r="3" fill="#22d3ee" opacity="0.5"/>
  
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
</svg>
